services:
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    env_file:
      - .env
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; do sleep 2; done &&
      mc mb --ignore-existing local/${APP_FILE_S3_BUCKET} &&
      mc anonymous set none local/${APP_FILE_S3_BUCKET}
      "
    restart: 'no'

  backend:
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      APP_FILE_STORAGE_TYPE: S3
      APP_FILE_S3_ENDPOINT: http://minio:9000
      APP_FILE_S3_REGION: ${APP_FILE_S3_REGION}
      APP_FILE_S3_BUCKET: ${APP_FILE_S3_BUCKET}
      APP_FILE_S3_ACCESS_KEY: ${APP_FILE_S3_ACCESS_KEY}
      APP_FILE_S3_SECRET_KEY: ${APP_FILE_S3_SECRET_KEY}
      APP_FILE_S3_PATH_STYLE_ACCESS_ENABLED: ${APP_FILE_S3_PATH_STYLE_ACCESS_ENABLED}
      APP_FILE_S3_KEY_PREFIX: ${APP_FILE_S3_KEY_PREFIX}

volumes:
  minio-data:
